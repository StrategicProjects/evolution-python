name: Release

# Publishes to PyPI via Trusted Publishing (OIDC) — no token/secret stored.
# Configure the trusted publisher on PyPI once (see README/DECISIONS):
#   project: evolution-api | owner: StrategicProjects | repo: evolution-python
#   workflow: release.yml   | environment: pypi
# Then push a tag like `v0.1.0` (or run manually) to publish.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Build sdist and wheel
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
